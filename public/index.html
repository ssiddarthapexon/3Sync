<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3Sync - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1>3Sync</h1>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div id="error-message" class="error-message"></div>
        <button type="submit" id="login-btn" class="btn btn-primary">Join Call</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-message');
      const btn = document.getElementById('login-btn');

      errorDiv.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          sessionStorage.setItem('token', data.token);
          sessionStorage.setItem('username', data.username);
          sessionStorage.setItem('turnServers', JSON.stringify(data.turnServers || null));
          window.location.href = '/call';
        } else {
          errorDiv.textContent = data.error || 'Invalid username or password';
          btn.disabled = false;
          btn.textContent = 'Join Call';
        }
      } catch (err) {
        errorDiv.textContent = 'Connection error: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Join Call';
      }
    });
  </script>
</body>
</html>
