# coturn TURN server configuration
# Location: /etc/turnserver.conf
# After editing, run: sudo systemctl restart coturn

# Server identity
realm=sidzy.in

# Network ports
listening-port=3478
listening-ip=0.0.0.0
tls-listening-port=5349
tls-listening-ip=0.0.0.0

# STUN/TURN credentials (use long-term authentication)
lt-cred-mech
user=turnuser:turnpassword
fingerprint

# SSL/TLS certificates (Let's Encrypt)
cert=/etc/letsencrypt/live/sidzy.in/fullchain.pem
pkey=/etc/letsencrypt/live/sidzy.in/privkey.pem

# Performance
max-bps=0
bps-capacity=0
internal-ip=0.0.0.0

# TURN relay ports
min-port=49152
max-port=65535

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=::ffff:127.0.0.1-::ffff:127.255.255.255
denied-peer-ip=::ffff:0.0.0.0-::ffff:255.255.255.255

# Bandwidth
bps-capacity=0
max-bps=0
