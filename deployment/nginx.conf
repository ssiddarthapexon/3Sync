# Nginx reverse proxy configuration for 3Sync
# Location: /etc/nginx/sites-available/3sync
# After creation, run: sudo ln -s /etc/nginx/sites-available/3sync /etc/nginx/sites-enabled/3sync

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sidzy.in www.sidzy.in;
    
    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Everything else redirects to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sidzy.in www.sidzy.in;

    # SSL certificates (generated by certbot)
    ssl_certificate /etc/letsencrypt/live/sidzy.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sidzy.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/sidzy.in/chain.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    # Reverse proxy to Node.js app on localhost:3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # WebSocket upgrade support (critical for Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Pass original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-lived connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        
        # Don't cache responses
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }
}
